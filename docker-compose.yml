services:
  # The Bones (Database)
  db:
    image: ankane/pgvector:v0.5.1
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD} 
      POSTGRES_DB: aperture_note
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  # The Brain (AI Agent)
  agent:
    build: ./apps/agent
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - JINA_API_KEY=${JINA_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - LLM_MODEL=${LLM_MODEL}
    depends_on:
      - db
    volumes:
      - ./apps/agent:/app  

  # The Nervous System (Backend API)
  server:
    build: ./apps/server
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=${DATABASE_URL} 
      - AGENT_URL=${AI_AGENT_URL}
      - JWT_SECRET=${JWT_SECRET}
      - REFRESH_SECRET=${REFRESH_SECRET}
    depends_on:
      - db
      - agent
    volumes:
      - ./apps/server:/app
      - /app/node_modules
    command:
      - sh
      - -c
      - "npx prisma db push && npm run dev"

  # The Window (Prisma Studio Database Viewer)
  studio:
    build: ./apps/server # Reuses the server build since it has Prisma installed
    ports:
      - "5555:5555"
    environment:
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      - db
    volumes:
      - ./apps/server:/app
      - /app/node_modules
    # --browser none is critical; containers don't have browsers to open
    command: npx prisma studio --browser none --port 5555

volumes:
  pgdata: